name: Build Silence

on:
    workflow_dispatch:
    release:
        types: [created]

permissions:
    contents: write
    actions: write

jobs:
    build-frontend:
        name: Build frontend
        runs-on: ubuntu-latest
        if: |
            github.event_name == 'workflow_dispatch' ||
            (github.event_name == 'release' &&
             contains(fromJson('["nv0skar"]'), github.actor))
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v1
              with:
                  bun-version: latest

            - name: Cache Bun dependencies
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.bun/install/cache
                      node_modules
                  key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
                  restore-keys: |
                      ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
                      ${{ runner.os }}-bun-

            - name: Install frontend dependencies
              run: bun install

            - name: Build frontend
              run: bun run build

            - name: Upload frontend dist
              uses: actions/upload-artifact@v4
              with:
                  name: frontend
                  path: target/
                  retention-days: 7

    build:
        name: Build Silence (${{ matrix.os }})
        runs-on: ${{ matrix.os }}
        needs: build-frontend
        if: |
            github.event_name == 'workflow_dispatch' ||
            (github.event_name == 'release' &&
             contains(fromJson('["nv0skar"]'), github.actor))

        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      target: x86_64-unknown-linux-gnu
                      artifact_name: silence
                      bin_name: silence
                      short_name: linux

                    - os: macos-latest
                      target: aarch64-apple-darwin
                      artifact_name: silence
                      bin_name: silence
                      short_name: macos

                    - os: windows-latest
                      target: x86_64-pc-windows-gnu
                      artifact_name: silence
                      bin_name: silence.exe
                      short_name: windows

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - name: Cache Rust dependencies
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/bin/
                      ~/.cargo/registry/index/
                      ~/.cargo/registry/cache/
                      ~/.cargo/git/db/
                      target/
                  key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
                      ${{ runner.os }}-cargo-

            # Download pre-built frontend.
            - name: Download frontend dist
              uses: actions/download-artifact@v4
              with:
                  name: frontend
                  path: target/

            # Build main binary.
            - name: Build Rust application
              run: cargo build --release --target ${{ matrix.target }}

            # Upload binary artifact.
            - name: Upload binary
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.artifact_name }}_${{ matrix.target }}
                  path: target/${{ matrix.target }}/release/${{ matrix.bin_name }}
                  retention-days: 7

    create-release-package:
        name: Upload Binaries to Release
        runs-on: ubuntu-latest
        needs: build
        if: github.event_name == 'release'
        steps:
            - name: Download all binaries
              uses: actions/download-artifact@v4
              with:
                  path: artifacts/

            # Packages each binary into an archive
            - name: Package binaries into distinct archives
              run: |
                  LINUX_DIR=$(find artifacts -maxdepth 1 -type d -name "*linux*")
                  mv "$LINUX_DIR/silence" "$LINUX_DIR/silence-linux-x86_64"
                  tar -czf artifacts/silence-linux-x86_64.tar.gz -C "$LINUX_DIR" silence-linux-x86_64

                  MACOS_DIR=$(find artifacts -maxdepth 1 -type d -name "*apple-darwin*")
                  mv "$MACOS_DIR/silence" "$MACOS_DIR/silence-macos-aarch64"
                  tar -czf artifacts/silence-macos-aarch64.tar.gz -C "$MACOS_DIR" silence-macos-aarch64

                  WINDOWS_FILE=$(find artifacts -type f -name "silence.exe")
                  mv "$WINDOWS_DIR/silence.exe" "$WINDOWS_DIR/silence-windows-x86_64.exe"
                  zip -j artifacts/silence-windows-x86_64.zip "$WINDOWS_FILE/silence-windows-x86_64.exe"

            - name: Upload binaries to release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ github.event.release.tag_name }}
                  files: |
                      artifacts/silence-linux-x86_64.tar.gz
                      artifacts/silence-macos-aarch64.tar.gz
                      artifacts/silence-windows-x86_64.zip

              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
