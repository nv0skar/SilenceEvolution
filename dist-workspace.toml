[workspace]
members = ["cargo:."]

[dist]
cargo-dist-version = "0.32.0"
installers = ["shell", "powershell"]
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-gnu"]
# targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-gnu", "aarch64-pc-windows-gnullvm"]
dist-dir = "target/distribution"
ci = "github"
install-updater = true
github-build-setup = "../setup_build.yml"
install-path = "CARGO_HOME"

[dist.github-custom-runners]
aarch64-pc-windows-gnullvm = "windows-11-arm"
